name: Adaptive Card Nightly Chaos

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: adaptive-card-nightly-chaos
  cancel-in-progress: false

jobs:
  nightly-chaos:
    runs-on: ubuntu-latest
    env:
      CHAOS_SEEDS: "101 202"
      GREENTIC_FAIL_ASSET_TRANSIENT: "1/5"
      GREENTIC_FAIL_DELAY_STATE_READ_MS: "50"
      GREENTIC_FAIL_DUPLICATE_INTERACTION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: wasm32-wasip2
      - name: Prefetch canonical WIT sources
        run: ./ci/prefetch_canonical_wit.sh
      - name: Restore cargo binaries cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-bins-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bins-
      - name: Install cargo-binstall
        uses: taiki-e/install-action@cargo-binstall
      - name: Install Greentic CLIs
        run: |
          cargo binstall -y greentic-dev greentic-flow greentic-integration-tester
          cargo binstall -y greentic-component --force
      - name: Save cargo binaries cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-bins-${{ hashFiles('**/Cargo.lock') }}
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build WASM (release)
        run: cargo build --target wasm32-wasip2 --release
      - name: Generate matrix gtests
        run: ./tests/tools/gen_matrix --mode full
      - name: Check matrix gtest drift
        run: bash ./ci/check_matrix_gtests.sh
      - name: Run nightly chaos suite
        id: run-chaos
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          CORPUS_ROOT="corpus/${DATE}"
          mkdir -p "${CORPUS_ROOT}"
          echo "corpus_root=${CORPUS_ROOT}" >> "$GITHUB_OUTPUT"

          for SEED in ${CHAOS_SEEDS}; do
            CORPUS_DIR="${CORPUS_ROOT}/${SEED}"
            mkdir -p "${CORPUS_DIR}"
            echo "Replay: greentic-integration-tester run --gtest tests/gtests --artifacts-dir ${CORPUS_DIR} --seed ${SEED}" > "${CORPUS_DIR}/replay.txt"
            greentic-integration-tester run --gtest tests/gtests/negative --artifacts-dir "${CORPUS_DIR}/negative" --seed "${SEED}"
            greentic-integration-tester run --gtest tests/gtests/matrix/pairwise --artifacts-dir "${CORPUS_DIR}/matrix/pairwise" --seed "${SEED}"
            greentic-integration-tester run --gtest tests/gtests/matrix/full --artifacts-dir "${CORPUS_DIR}/matrix/full" --seed "${SEED}"
          done
      - name: Upload failure corpus
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: adaptive-card-failure-corpus
          path: ${{ steps.run-chaos.outputs.corpus_root }}
