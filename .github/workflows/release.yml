name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: wasm32-wasip2
      - name: Prefetch canonical WIT sources
        run: ./ci/prefetch_canonical_wit.sh
      - name: Build WASM (release)
        run: cargo build --target wasm32-wasip2 --release
      - name: Install blake3 for release manifest hashing
        run: python -m pip install --user blake3
      - name: Prepare GitHub release bundle
        run: bash ./ci/prepare_github_release.sh release
      - name: Export release metadata
        run: cat release/release.env >> "$GITHUB_ENV"
      - name: Ensure release tags point at this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ensure_tag() {
            local tag="$1"
            if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null 2>&1; then
              gh api -X PATCH "repos/${GITHUB_REPOSITORY}/git/refs/tags/${tag}" -f sha="${GITHUB_SHA}" -F force=true >/dev/null
            else
              gh api -X POST "repos/${GITHUB_REPOSITORY}/git/refs" -f ref="refs/tags/${tag}" -f sha="${GITHUB_SHA}" >/dev/null
            fi
          }
          ensure_tag "${VERSION_TAG}"
          ensure_tag "${LATEST_TAG}"
      - name: Create or update GitHub releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          publish_release() {
            local tag="$1"
            local title="$2"
            if gh release view "${tag}" >/dev/null 2>&1; then
              gh release edit "${tag}" --title "${title}" --notes-file "${RELEASE_NOTES_PATH}"
            else
              gh release create "${tag}" --title "${title}" --notes-file "${RELEASE_NOTES_PATH}" --target "${GITHUB_SHA}"
            fi
            gh release upload "${tag}" \
              "${RELEASE_ARCHIVE_PATH}" \
              "${RELEASE_MANIFEST_PATH}" \
              "${RELEASE_WASM_PATH}" \
              "${RELEASE_ANSWERS_PATH}" \
              "${RELEASE_CARD_PATH}" \
              --clobber
          }
          publish_release "${VERSION_TAG}" "${VERSION_RELEASE_TITLE}"
          publish_release "${LATEST_TAG}" "${LATEST_RELEASE_TITLE}"

  ghcr-publish:
    needs: [github-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - name: Prefetch canonical WIT sources
        run: ./ci/prefetch_canonical_wit.sh
      - name: Build WASM (release)
        run: cargo build --target wasm32-wasip2 --release
      - name: Check host state capability wiring
        run: ./ci/check_host_state_capability.sh
      - name: Prepare publish artifacts
        run: |
          WASM_PATH=$(jq -r '.artifacts.component_wasm' component.manifest.json)
          WASM_BASENAME=$(basename "$WASM_PATH")
          cp "$WASM_PATH" "$WASM_BASENAME"
          cp component.manifest.json component.publish.manifest.json
          jq --arg wasm "$WASM_BASENAME" '.artifacts.component_wasm = $wasm' component.publish.manifest.json > component.publish.tmp && mv component.publish.tmp component.publish.manifest.json
          python -m pip install --user blake3
          WASM_BASENAME="$WASM_BASENAME" python - <<'PY'
          import json
          import os
          from pathlib import Path
          import blake3

          manifest = Path("component.publish.manifest.json")
          wasm_path = Path(os.environ["WASM_BASENAME"])

          data = json.loads(manifest.read_text())
          digest = blake3.blake3(wasm_path.read_bytes()).hexdigest()
          data["hashes"]["component_wasm"] = f"blake3:{digest}"
          manifest.write_text(json.dumps(data, indent=2))
          PY
          # Rename to component.manifest.json so greentic-pack can find it by expected name
          cp component.publish.manifest.json component.manifest.json
          ls -l "$WASM_BASENAME" component.manifest.json component.publish.manifest.json
      - name: Install ORAS
        uses: oras-project/setup-oras@v1
      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GITHUB_TOKEN}" | oras login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
      - name: Push OCI artifact to GHCR
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')
          COMPONENT_NAME=$(jq -r '.name' component.manifest.json)
          WASM_PATH=$(jq -r '.artifacts.component_wasm' component.manifest.json)
          WASM_BASENAME=$(basename "$WASM_PATH")
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER}/components/${COMPONENT_NAME}"
          oras push "${IMAGE}:latest" \
            --annotation org.opencontainers.image.source="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            component.manifest.json:application/vnd.greentic.component.manifest+json \
            "${WASM_BASENAME}":application/wasm
          oras push "${IMAGE}:${VERSION}" \
            --annotation org.opencontainers.image.source="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            component.manifest.json:application/vnd.greentic.component.manifest+json \
            "${WASM_BASENAME}":application/wasm
