name: Adaptive Card PR Gate

on:
  pull_request:
    paths:
      - ".github/workflows/adaptive-card-pr-gate.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "README.md"
      - "component.manifest.json"
      - "schemas/**"
      - "src/**"
      - "tests/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: wasm32-wasip2
      - name: Prefetch canonical WIT sources
        run: ./ci/prefetch_canonical_wit.sh
      - name: Restore cargo binaries cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - name: Install cargo-binstall
        uses: taiki-e/install-action@cargo-binstall
      - name: Ensure cargo bin path is on PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Install Greentic CLIs and wasm-tools
        run: |
          cargo binstall -y greentic-dev greentic-flow greentic-integration-tester
          cargo binstall -y greentic-component --force
          cargo binstall -y wasm-tools --force
      - name: Verify installed CLIs
        run: |
          echo "PATH=$PATH"
          ls -la "$HOME/.cargo/bin" || true
          command -v greentic-integration-tester
          command -v greentic-component
          command -v wasm-tools
          wasm-tools --version
      - name: Save cargo binaries cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build WASM (release)
        run: cargo build --target wasm32-wasip2 --release
      - name: Generate matrix pairwise gtests
        run: ./tests/tools/gen_matrix --mode pairwise
      - name: Check matrix gtest drift
        run: bash ./ci/check_matrix_gtests.sh
      - name: Run Adaptive Card gtests
        run: |
          set -euo pipefail
          run_gtest() {
            local path="$1"
            local artifacts="$2"
            if [ -d "$path" ] && find "$path" -name "*.gtest" -print -quit | grep -q .; then
              greentic-integration-tester run --gtest "$path" --artifacts-dir "$artifacts"
            else
              echo "No .gtest files under $path; skipping."
            fi
          }
          mkdir -p artifacts/readme artifacts/matrix artifacts/negative
          run_gtest "tests/gtests/README" "artifacts/readme"
          run_gtest "tests/gtests/matrix/pairwise" "artifacts/matrix"
          run_gtest "tests/gtests/negative/smoke" "artifacts/negative"
      - name: Upload gtest artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: adaptive-card-gtest-artifacts
          path: artifacts
