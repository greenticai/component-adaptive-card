name: CI
on:
  workflow_call:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/wasm-component-ci.yml@main
    with:
      setup-script: "./ci/prefetch_canonical_wit.sh"

  readme-gtests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: wasm32-wasip2
      - name: Prefetch canonical WIT sources
        run: ./ci/prefetch_canonical_wit.sh
      - name: Restore cargo binaries cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - name: Install cargo-binstall
        uses: taiki-e/install-action@cargo-binstall
      - name: Ensure cargo bin path is on PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Install Greentic CLIs and wasm-tools
        run: |
          cargo binstall -y greentic-dev greentic-flow greentic-integration-tester
          cargo binstall -y greentic-component --force
          cargo binstall -y wasm-tools --force
      - name: Verify installed CLIs
        run: |
          echo "PATH=$PATH"
          ls -la "$HOME/.cargo/bin" || true
          command -v greentic-integration-tester
          command -v greentic-component
          command -v wasm-tools
          wasm-tools --version
      - name: Save cargo binaries cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Build WASM (release)
        run: cargo build --target wasm32-wasip2 --release
      - name: Check host state capability wiring
        run: ./ci/check_host_state_capability.sh
      - name: Run README gtests
        env:
          GREENTIC_TRACE_OUT: ${{ github.workspace }}/artifacts/readme-gtests/trace.json
        run: |
          mkdir -p artifacts/readme-gtests
          greentic-integration-tester run --gtest tests/gtests/README --artifacts-dir artifacts/readme-gtests --errors
