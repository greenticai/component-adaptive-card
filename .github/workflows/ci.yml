name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: wasm32-wasip2
      - name: Prefetch canonical WIT sources
        run: ./ci/prefetch_canonical_wit.sh
      - name: Cargo fmt
        run: cargo fmt --all -- --check
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cargo test
        run: cargo test --workspace --all-targets
      - name: Cargo check (wasm32-wasip2)
        run: cargo check --target wasm32-wasip2
      - name: Build WASM (release)
        run: cargo build --target wasm32-wasip2 --release
      - name: Check host state capability wiring
        run: ./ci/check_host_state_capability.sh
  readme-gtests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: wasm32-wasip2
      - name: Prefetch canonical WIT sources
        run: ./ci/prefetch_canonical_wit.sh
      - name: Restore cargo binaries cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-bins-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bins-
      - name: Install cargo-binstall
        run: |
          if ! command -v cargo-binstall >/dev/null 2>&1; then
            cargo install cargo-binstall --locked
          fi
      - name: Install Greentic CLIs
        run: |
          cargo binstall -y greentic-dev greentic-flow greentic-integration-tester
          cargo binstall -y greentic-component --force
      - name: Save cargo binaries cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-bins-${{ hashFiles('**/Cargo.lock') }}
      - name: Build WASM (release)
        run: cargo build --target wasm32-wasip2 --release
      - name: Check host state capability wiring
        run: ./ci/check_host_state_capability.sh
      - name: Run README gtests
        env:
          GREENTIC_TRACE_OUT: ${{ github.workspace }}/artifacts/readme-gtests/trace.json
        run: |
          mkdir -p artifacts/readme-gtests
          greentic-integration-tester run --gtest tests/gtests/README --artifacts-dir artifacts/readme-gtests --errors
